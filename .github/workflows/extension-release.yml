name: Extension Release

on:
  push:
    tags:
      - 'ext-v*'  # Trigger on tags like ext-v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      target:
        description: 'Release target'
        required: true
        type: choice
        options:
          - both
          - chrome-only
          - firefox-only
        default: both
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: boolean
        default: false

defaults:
  run:
    working-directory: extension

env:
  # Chrome Web Store credentials
  CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
  CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
  CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
  CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
  # Firefox AMO credentials
  FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
  FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish_chrome: ${{ steps.targets.outputs.chrome }}
      publish_firefox: ${{ steps.targets.outputs.firefox }}
      dry_run: ${{ steps.config.outputs.dry_run }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # Extract version from tag (ext-v1.0.0 -> 1.0.0)
            VERSION="${GITHUB_REF#refs/tags/ext-v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"
        working-directory: .

      - name: Determine targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "chrome=true" >> $GITHUB_OUTPUT
            echo "firefox=true" >> $GITHUB_OUTPUT
          else
            TARGET="${{ github.event.inputs.target }}"
            if [ "$TARGET" == "both" ] || [ "$TARGET" == "chrome-only" ]; then
              echo "chrome=true" >> $GITHUB_OUTPUT
            else
              echo "chrome=false" >> $GITHUB_OUTPUT
            fi
            if [ "$TARGET" == "both" ] || [ "$TARGET" == "firefox-only" ]; then
              echo "firefox=true" >> $GITHUB_OUTPUT
            else
              echo "firefox=false" >> $GITHUB_OUTPUT
            fi
          fi
        working-directory: .

      - name: Determine dry run
        id: config
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "dry_run=false" >> $GITHUB_OUTPUT
          else
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          fi
        working-directory: .

  build:
    name: Build Extensions
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Update manifest version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          # Update Chrome manifest
          jq --arg v "$VERSION" '.version = $v' public/manifest.json > tmp.json && mv tmp.json public/manifest.json
          # Update Firefox manifest
          jq --arg v "$VERSION" '.version = $v' public/manifest.firefox.json > tmp.json && mv tmp.json public/manifest.firefox.json
          echo "Updated manifests to version $VERSION"

      - name: Build Chrome extension
        run: npm run build

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Create Chrome ZIP
        run: |
          cd dist
          zip -r ../waillet-chrome-${{ needs.prepare.outputs.version }}.zip .
          cd ..

      - name: Create Firefox ZIP
        run: |
          cd dist-firefox
          zip -r ../waillet-firefox-${{ needs.prepare.outputs.version }}.zip .
          cd ..

      - name: Upload Chrome ZIP
        uses: actions/upload-artifact@v4
        with:
          name: chrome-zip
          path: extension/waillet-chrome-${{ needs.prepare.outputs.version }}.zip
          retention-days: 90

      - name: Upload Firefox ZIP
        uses: actions/upload-artifact@v4
        with:
          name: firefox-zip
          path: extension/waillet-firefox-${{ needs.prepare.outputs.version }}.zip
          retention-days: 90

  publish-chrome:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.publish_chrome == 'true' && needs.prepare.outputs.dry_run == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Chrome ZIP
        uses: actions/download-artifact@v4
        with:
          name: chrome-zip
          path: ./

      - name: Install chrome-webstore-upload-cli
        run: npm install -g chrome-webstore-upload-cli
        working-directory: .

      - name: Upload to Chrome Web Store
        run: |
          chrome-webstore-upload upload \
            --source waillet-chrome-${{ needs.prepare.outputs.version }}.zip \
            --extension-id $CHROME_EXTENSION_ID \
            --client-id $CHROME_CLIENT_ID \
            --client-secret $CHROME_CLIENT_SECRET \
            --refresh-token $CHROME_REFRESH_TOKEN
        working-directory: .

      - name: Publish to Chrome Web Store
        run: |
          chrome-webstore-upload publish \
            --extension-id $CHROME_EXTENSION_ID \
            --client-id $CHROME_CLIENT_ID \
            --client-secret $CHROME_CLIENT_SECRET \
            --refresh-token $CHROME_REFRESH_TOKEN
        working-directory: .

  publish-firefox:
    name: Publish to Firefox Add-ons
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.publish_firefox == 'true' && needs.prepare.outputs.dry_run == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Firefox ZIP
        uses: actions/download-artifact@v4
        with:
          name: firefox-zip
          path: ./

      - name: Install web-ext
        run: npm install -g web-ext
        working-directory: .

      - name: Sign and publish to Firefox Add-ons
        run: |
          web-ext sign \
            --source-dir . \
            --artifacts-dir ./artifacts \
            --api-key $FIREFOX_JWT_ISSUER \
            --api-secret $FIREFOX_JWT_SECRET \
            --channel listed
        working-directory: .
        env:
          # Unzip for signing
          EXTENSION_ZIP: waillet-firefox-${{ needs.prepare.outputs.version }}.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build, publish-chrome, publish-firefox]
    if: always() && needs.build.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome ZIP
        uses: actions/download-artifact@v4
        with:
          name: chrome-zip
          path: ./artifacts/

      - name: Download Firefox ZIP
        uses: actions/download-artifact@v4
        with:
          name: firefox-zip
          path: ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ext-v${{ needs.prepare.outputs.version }}
          name: Extension v${{ needs.prepare.outputs.version }}
          draft: ${{ needs.prepare.outputs.dry_run == 'true' }}
          generate_release_notes: true
          files: |
            ./artifacts/waillet-chrome-${{ needs.prepare.outputs.version }}.zip
            ./artifacts/waillet-firefox-${{ needs.prepare.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
