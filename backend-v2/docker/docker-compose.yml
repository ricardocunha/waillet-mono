version: '3.8'

services:
  waillet:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_secret
      - MYSQL_DATABASE=waillet
      - MYSQL_USER=waillet
      - MYSQL_PASSWORD=waillet_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ../internal/database/migrations/001_init.up.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waillet-network

volumes:
  mysql_data:

networks:
  waillet-network:
    driver: bridge
