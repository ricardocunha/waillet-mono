services:
  mysql:
    image: mysql:8.0
    container_name: waillet-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: waillet_root_pass
      MYSQL_DATABASE: waillet
      MYSQL_USER: waillet_user
      MYSQL_PASSWORD: waillet_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local


